<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Craft Your Message favicon</title>
  <desc id="desc">A rounded square icon with a pink-to-purple gradient background and white CY lettering with a sparkle accent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6b9d" />
      <stop offset="0.5" stop-color="#c44dff" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect width="512" height="512" rx="112" fill="url(#shine)" />
  <rect x="20" y="20" width="472" height="472" rx="96" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="8" />
  <text x="256" y="275" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="160" font-weight="800" letter-spacing="-8">CY</text>
  <circle cx="380" cy="140" r="32" fill="#ffd166" opacity="0.9" filter="url(#shadow)" />
  <text x="380" y="150" text-anchor="middle" dominant-baseline="middle" font-size="36" filter="url(#shadow)">💬</text>
</svg>
