<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Craft Your Message favicon</title>
  <desc id="desc">A premium rounded square icon with a dark purple gradient and white CYM lettering.</desc>
  <defs>
    <linearGradient id="background" x1="78" y1="55" x2="434" y2="457" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07050e" />
      <stop offset="0.48" stop-color="#18122b" />
      <stop offset="1" stop-color="#32165f" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(356 116) rotate(126) scale(390)">
      <stop offset="0" stop-color="#6741d9" stop-opacity="0.62" />
      <stop offset="0.55" stop-color="#2a1455" stop-opacity="0.28" />
      <stop offset="1" stop-color="#07050e" stop-opacity="0" />
    </radialGradient>
    <filter id="text-shadow" x="0" y="0" width="512" height="512" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#background)" />
  <rect width="512" height="512" rx="112" fill="url(#glow)" />
  <rect x="18" y="18" width="476" height="476" rx="96" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="12" />
  <text x="256" y="271" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" filter="url(#text-shadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="138" font-weight="800" letter-spacing="-6">CYM</text>
</svg>
